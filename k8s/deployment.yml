apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-game-session-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-game-session-service
  template:
    metadata:
      labels:
        app: cloud-game-session-service
    spec:
      containers:
        - name: app
          image: cloud-game-session-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: cloud-game-session-config
            - secretRef:
                name: cloud-game-session-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
