spring:
  application:
    name: cloud-game-session-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

management:
  health:
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}

app:
  admin-api-key: ${ADMIN_API_KEY:dev-admin-key}
  store:
    type: ${APP_STORE_TYPE:memory}
  persistence:
    type: ${APP_PERSISTENCE_TYPE:memory}
  heartbeat-timeout: ${APP_HEARTBEAT_TIMEOUT:45s}
  active-session-ttl: ${APP_ACTIVE_SESSION_TTL:60s}
  scheduler:
    queue-drain-delay: ${APP_QUEUE_DRAIN_DELAY:5s}
    expiration-delay: ${APP_EXPIRATION_DELAY:5s}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
