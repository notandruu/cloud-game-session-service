services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_STORE_TYPE: redis
      APP_PERSISTENCE_TYPE: memory
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MANAGEMENT_HEALTH_REDIS_ENABLED: true
      ADMIN_API_KEY: local-admin-key
      APP_HEARTBEAT_TIMEOUT: 45s
      APP_ACTIVE_SESSION_TTL: 60s
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 20
